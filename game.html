<!DOCTYPE html>
<html>
<html lang="en">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Game</title>
        <link rel="stylesheet" crossorigin href="game.css">
        <script src="game.js"></script>
    </head>
    <body class="part" onload="start();">
        <div class="overlay" id="overnew"><center><p id="New Game"></p><button onclick="location.reload()" class="text-xs py-1 px-2 bg-blue-500 hover:bg-blue-700 cursor-pointer">Play Again</button></center></div>
        <div class="invalidanimation" id="overtext"><center><p id="Wrong Word"></p></center></div>
        <div class="relative size-32 w-full">
            <div class="absolute right-0 top-0">
                <button onclick="location.href='index.html'" class="text-xs py-1 px-2 bg-blue-500 hover:bg-blue-700 cursor-pointer">Back to Menu</button>
            </div>
            <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                <p class="text-center text-red-500 font-bold font-serif text-3xl pointer-events-none">Wordle but Worse</p>
            </div>
        </div>
        <div id="row1" class="row">
            <div class="field"><p id="a1"></p></div>
            <div class="field"><p id="a2"></p></div>
            <div class="field"><p id="a3"></p></div>
            <div class="field"><p id="a4"></p></div>
            <div class="field"><p id="a5"></p></div>
        </div>
        <div id="row2" class="row">
            <div class="field"><p id="b1"></p></div>
            <div class="field"><p id="b2"></p></div>
            <div class="field"><p id="b3"></p></div>
            <div class="field"><p id="b4"></p></div>
            <div class="field"><p id="b5"></p></div>
        </div>
        <div id="row3" class="row">
            <div class="field"><p id="c1"></p></div>
            <div class="field"><p id="c2"></p></div>
            <div class="field"><p id="c3"></p></div>
            <div class="field"><p id="c4"></p></div>
            <div class="field"><p id="c5"></p></div>
        </div>
        <div id="row4" class="row">
            <div class="field"><p id="d1"></p></div>
            <div class="field"><p id="d2"></p></div>
            <div class="field"><p id="d3"></p></div>
            <div class="field"><p id="d4"></p></div>
            <div class="field"><p id="d5"></p></div>
        </div>
        <div id="row5" class="row">
            <div class="field"><p id="e1"></p></div>
            <div class="field"><p id="e2"></p></div>
            <div class="field"><p id="e3"></p></div>
            <div class="field"><p id="e4"></p></div>
            <div class="field"><p id="e5"></p></div>
        </div>
        <div id="row6" class="row">
            <div class="field"><p id="f1"></p></div>
            <div class="field"><p id="f2"></p></div>
            <div class="field"><p id="f3"></p></div>
            <div class="field"><p id="f4"></p></div>
            <div class="field"><p id="f5"></p></div>
        </div>
        <input type="text" id="inp" maxlength="8" oninput="adjustFields()" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        <div class="keyboard" id="kbrow1">
            <div class="keyboard-key" onclick="kbclick(this)"><p class="key-text" id="q">Q</p></div>
            <div class="keyboard-key" onclick="kbclick(this)"><p class="key-text" id="w">W</p></div>
            <div class="keyboard-key" onclick="kbclick(this)"><p class="key-text" id="e">E</p></div>
            <div class="keyboard-key" onclick="kbclick(this)"><p class="key-text" id="r">R</p></div>
            <div class="keyboard-key" onclick="kbclick(this)"><p class="key-text" id="t">T</p></div>
            <div class="keyboard-key" onclick="kbclick(this)"><p class="key-text" id="y">Y</p></div>
            <div class="keyboard-key" onclick="kbclick(this)"><p class="key-text" id="u">U</p></div>
            <div class="keyboard-key" onclick="kbclick(this)"><p class="key-text" id="i">I</p></div>
            <div class="keyboard-key" onclick="kbclick(this)"><p class="key-text" id="o">O</p></div>
            <div class="keyboard-key" onclick="kbclick(this)"><p class="key-text" id="p">P</p></div>
        </div>
        <div class="keyboard" id="kbrow2">
            <div class="keyboard-key" onclick="kbclick(this)"><p class="key-text" id="a">A</p></div>
            <div class="keyboard-key" onclick="kbclick(this)"><p class="key-text" id="s">S</p></div>
            <div class="keyboard-key" onclick="kbclick(this)"><p class="key-text" id="d">D</p></div>
            <div class="keyboard-key" onclick="kbclick(this)"><p class="key-text" id="f">F</p></div>
            <div class="keyboard-key" onclick="kbclick(this)"><p class="key-text" id="g">G</p></div>
            <div class="keyboard-key" onclick="kbclick(this)"><p class="key-text" id="h">H</p></div>
            <div class="keyboard-key" onclick="kbclick(this)"><p class="key-text" id="j">J</p></div>
            <div class="keyboard-key" onclick="kbclick(this)"><p class="key-text" id="k">K</p></div>
            <div class="keyboard-key" onclick="kbclick(this)"><p class="key-text" id="l">L</p></div>
        </div>
        <div class="keyboard" id="kbrow3">
            <div class="EnterKey" onclick="kbclick(this)"><p class="key-text" id="enter">Enter</p></div>
            <div class="keyboard-key" onclick="kbclick(this)"><p class="key-text" id="z">Z</p></div>
            <div class="keyboard-key" onclick="kbclick(this)"><p class="key-text" id="x">X</p></div>
            <div class="keyboard-key" onclick="kbclick(this)"><p class="key-text" id="c">C</p></div>
            <div class="keyboard-key" onclick="kbclick(this)"><p class="key-text" id="v">V</p></div>
            <div class="keyboard-key" onclick="kbclick(this)"><p class="key-text" id="b">B</p></div>
            <div class="keyboard-key" onclick="kbclick(this)"><p class="key-text" id="n">N</p></div>
            <div class="keyboard-key" onclick="kbclick(this)"><p class="key-text" id="m">M</p></div>
            <div class="BackKey" onclick="kbclick(this)"><p class="key-text" id="backspace">Backspace</p></div>
        </div>
    </body>
</html>
