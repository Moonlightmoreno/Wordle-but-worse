<!DOCTYPE html>
<html>
<html lang="en">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Game</title>
        <link rel="stylesheet" crossorigin href="assets/game.css">
        <script src="mathle.js"></script>
    </head>
    <body class="part" onload="start();">
        <div class="overlay" id="overnew"><center><p id="New Game"></p><button onclick="location.reload()" class="text-xs py-1 px-2 bg-blue-500 hover:bg-blue-700 cursor-pointer">Play Again</button></center></div>
        <div class="invalidanimation" id="overtext"><center><p id="Wrong Word"></p></center></div>
        <div class="relative size-32 w-full">
            <div class="absolute right-0 top-0">
                <button onclick="location.href='index.html'" class="text-xs py-1 px-2 bg-blue-500 hover:bg-blue-700 cursor-pointer">Back to Menu</button>
            </div>
            <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                <p class="text-center text-red-500 font-bold font-serif text-3xl pointer-events-none">Mathle but Worse</p>
            </div>
        </div>
        <div id="row1" class="row">
            <div class="field"><p id="a1"></p></div>
            <div class="field"><p id="a2"></p></div>
            <div class="field"><p id="a3"></p></div>
            <div class="field"><p id="a4"></p></div>
            <div class="field"><p id="a5"></p></div>
            <div class="equal"><p>=</p></div>
            <div class="field"><p id="a6"></p></div>
            <div class="field"><p id="a7"></p></div>
            <div class="field"><p id="a8"></p></div>
        </div>
        <div id="row2" class="row">
            <div class="field"><p id="b1"></p></div>
            <div class="field"><p id="b2"></p></div>
            <div class="field"><p id="b3"></p></div>
            <div class="field"><p id="b4"></p></div>
            <div class="field"><p id="b5"></p></div>
            <div class="equal"><p >=</p></div>
            <div class="field"><p id="b6"></p></div>
            <div class="field"><p id="b7"></p></div>
            <div class="field"><p id="b8"></p></div>
        </div>
        <div id="row3" class="row">
            <div class="field"><p id="c1"></p></div>
            <div class="field"><p id="c2"></p></div>
            <div class="field"><p id="c3"></p></div>
            <div class="field"><p id="c4"></p></div>
            <div class="field"><p id="c5"></p></div>
            <div class="equal"><p>=</p></div>
            <div class="field"><p id="c6"></p></div>
            <div class="field"><p id="c7"></p></div>
            <div class="field"><p id="c8"></p></div>
        </div>
        <div id="row4" class="row">
            <div class="field"><p id="d1"></p></div>
            <div class="field"><p id="d2"></p></div>
            <div class="field"><p id="d3"></p></div>
            <div class="field"><p id="d4"></p></div>
            <div class="field"><p id="d5"></p></div>
            <div class="equal"><p>=</p></div>
            <div class="field"><p id="d6"></p></div>
            <div class="field"><p id="d7"></p></div>
            <div class="field"><p id="d8"></p></div>
        </div>
        <div id="row5" class="row">
            <div class="field"><p id="e1"></p></div>
            <div class="field"><p id="e2"></p></div>
            <div class="field"><p id="e3"></p></div>
            <div class="field"><p id="e4"></p></div>
            <div class="field"><p id="e5"></p></div>
            <div class="equal"><p>=</p></div>
            <div class="field"><p id="e6"></p></div>
            <div class="field"><p id="e7"></p></div>
            <div class="field"><p id="e8"></p></div>
        </div>
        <input type="text" id="inp" maxlength="8" oninput="adjustFields()" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        <div class="keyboard" id="kbrow1">
            <div class="keyboard-key" onclick="kbclick(this)"><p class="key-text" id="1">1</p></div>
            <div class="keyboard-key" onclick="kbclick(this)"><p class="key-text" id="2">2</p></div>
            <div class="keyboard-key" onclick="kbclick(this)"><p class="key-text" id="3">3</p></div>
            <div class="keyboard-key" onclick="kbclick(this)"><p class="key-text" id="4">4</p></div>
            <div class="keyboard-key" onclick="kbclick(this)"><p class="key-text" id="5">5</p></div>
            <div class="keyboard-key" onclick="kbclick(this)"><p class="key-text" id="6">6</p></div>
            <div class="keyboard-key" onclick="kbclick(this)"><p class="key-text" id="7">7</p></div>
            <div class="keyboard-key" onclick="kbclick(this)"><p class="key-text" id="8">8</p></div>
            <div class="keyboard-key" onclick="kbclick(this)"><p class="key-text" id="9">9</p></div>
            <div class="keyboard-key" onclick="kbclick(this)"><p class="key-text" id="0">0</p></div>
        </div>
        <div class="keyboard" id="kbrow2">
            <div class="BackKey" onclick="kbclick(this)"><p class="key-text" id="backspace">Backspace</p></div>
            <div class="keyboard-key" onclick="kbclick(this)"><p class="key-text" id="+">+</p></div>
            <div class="keyboard-key" onclick="kbclick(this)"><p class="key-text" id="-">-</p></div>
            <div class="keyboard-key" onclick="kbclick(this)"><p class="key-text" id="*">*</p></div>
            <div class="keyboard-key" onclick="kbclick(this)"><p class="key-text" id="/">/</p></div>
            <div class="EnterKey" onclick="kbclick(this)"><p class="key-text" id="enter">Enter</p></div>
        </div>
    </body>
</html>
